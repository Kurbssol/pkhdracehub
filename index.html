<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PKHD RaceHub</title>

<link rel="stylesheet" href="style.css">

<!-- VIDEO.JS PLAYER -->
<link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet"/>
<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

</head>

<body>

<header>
<h1>🏁 PKHD RaceHub</h1>
<p>Live Motorsport Streams</p>
</header>
    
<!-- SCHEDULE -->
<div class="schedule">

<h2>📅 Race Schedule</h2>

<table>
<tr>
<th>Time</th>
<th>Event</th>
<th>Status</th>
</tr>

<tr>
<td>12:00 PM ET</td>
<td>INDYCAR Grand Prix</td>
<td class="offline">OFFLINE</td>
</tr>

<tr>
<td>3:30 PM ET</td>
<td>NASCAR Cup Series - Circuit of the Americas (Austin)</td>
<td class="online">LIVE</td>
</tr>

</table>

</div>
<nav style="text-align:center; margin-top:20px;">
  <a href="schedule.html" style="color:white; font-weight:bold;">📅 Full NASCAR & IndyCar Schedule</a>
</nav>

<div class="container">

<!-- STREAM + CHAT -->
<div class="stream-area">

<!-- VIDEO PLAYER -->
<div class="player">

<video
id="pkhd-player"
class="video-js vjs-default-skin vjs-big-play-centered"
controls
autoplay
preload="auto"
crossorigin="anonymous"
data-setup='{"fluid": true}'>
</video>

</div>

<!-- TWITCH CHAT -->
<div class="chat">
<iframe
src="https://www.twitch.tv/embed/pkhd24/chat?parent=pkhdracehub.vercel.app"
width="100%"
height="100%">
</iframe>
</div>

</div>

<!-- SERVER BUTTONS -->
<div class="servers">

<button onclick="loadStream('https://dtmf21.b-cdn.net/docx/master.m3u8')">
Server 1 (NASCAR)
</button>

<button onclick="loadStream('https://moiptvhls-i.akamaihd.net/hls/live/652316/secure/master.m3u8')">
Server 2 (NASCAR)
</button>

<button onclick="loadStream('https://example.com/live.ts')">
Backup Server (NASCAR)
</button>

<button onclick="loadStream('https://dtmf21.b-cdn.net/docx/master.m3u8')">
Server 1 (INDY)
</button>

<button onclick="loadStream('https://moiptvhls-i.akamaihd.net/hls/live/652316/secure/master.m3u8')">
Server 2 (INDY)
</button>

<button onclick="loadStream('https://example.com/live.ts')">
Backup Server (INDY)
</button>    

</div>

</div>

<footer>
PKHD RaceHub © 2026
</footer>

<script>
// VIDEO.JS PLAYER SCRIPT
const player = videojs('pkhd-player');

function loadStream(url){

    // HLS (.m3u8)
    if(url.endsWith('.m3u8')){
        player.src({
            src: url,
            type: 'application/x-mpegURL'
        });
    }

    // TS or other formats fallback
    else{
        player.src({
            src: url,
            type: 'video/mp2t'
        });
    }

    player.play();
}

// Auto-load first server on page load
loadStream('https://dtmf21.b-cdn.net/docx/master.m3u8');
</script>

</body>
</html>
