<script>

// INIT VIDEOJS
const player = videojs('pkhd-player');

// LOAD M3U8 / TS STREAMS
function loadStream(url){

    document.getElementById("iframe-player").style.display = "none";
    document.getElementById("pkhd-player").style.display = "block";

    if(url.endsWith('.m3u8')){
        player.src({
            src: url,
            type: 'application/x-mpegURL'
        });
    }
    else{
        player.src({
            src: url,
            type: 'video/mp2t'
        });
    }

    player.play();
}

// LOAD IFRAME STREAM
function loadIframe(url){

    player.pause();

    document.getElementById("pkhd-player").style.display = "none";

    const iframe = document.getElementById("iframe-player");
    iframe.style.display = "block";
    iframe.src = url;
}

// AUTO LOAD FIRST STREAM
loadStream('https://601.oletv20.shop/nascar.m3u8');

</script>
